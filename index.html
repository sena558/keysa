<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Keysa ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#ff4d6d,#ff8fab,#ffc2d1);
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* LOGIN */
#loginBox{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding:35px;
    border-radius:25px;
    width:320px;
    text-align:center;
    box-shadow:0 0 25px rgba(0,0,0,0.3);
}

#loginBox h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    outline:none;
    margin-bottom:15px;
    text-align:center;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:white;
    color:#ff4d6d;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* HALAMAN UTAMA */
#main{
    display:none;
    text-align:center;
    padding:20px;
    animation:fade 1s ease;
}

.foto{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:50%;
    border:6px solid white;
    box-shadow:0 0 25px rgba(255,255,255,0.8);
    margin-bottom:20px;
    animation: muter 8s linear infinite;
}

.judul{
    font-size:42px;
    margin-bottom:20px;
    text-shadow:0 0 10px white;
}

.teks-box{
    max-width:700px;
    margin:auto;
    background: rgba(255,255,255,0.12);
    padding:25px;
    border-radius:25px;
    backdrop-filter: blur(10px);
    line-height:1.8;
    font-size:19px;
    text-align:left;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

/* CURSOR MENGETIK */
.cursor{
    display:inline-block;
    color:white;
    animation: kedip 0.7s infinite;
}

@keyframes kedip{
    50%{
        opacity:0;
    }
}

/* LOVE */
.love{
    position:absolute;
    top:-20px;
    color:white;
    animation:jatuh linear forwards;
}

@keyframes jatuh{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes muter{
    100%{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<!-- MUSIC -->
<audio id="musik" loop>
    <!-- GANTI music.mp3 DENGAN LAGU KAMU -->
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- LOGIN -->
<div id="loginBox">
    <h1>🔒 Private Love</h1>

    <input type="password" id="password" placeholder="Masukkan Sandi">

    <button onclick="cekPassword()">Buka ❤️</button>
</div>

<!-- HALAMAN -->
<div id="main">

    <img src="keysa.jpg" class="foto">

    <div class="judul">
        Sayang Keysaaaa ❤️
    </div>

    <div class="teks-box">
        <span id="typing"></span><span class="cursor">|</span>
    </div>

</div>

<script>

const text = `
Haii Keysaaa ❤️

Aku cuma mau bilang...
makasih ya udah hadir di hidup aku.

Kamu itu rumah paling nyaman buat aku.
Setiap hari rasanya selalu lebih indah kalau ada kamu.

Senyuman kamu bikin aku tenang,
perhatian kamu bikin aku bahagia,
dan semua tentang kamu selalu bikin aku jatuh cinta lagi setiap hari. 💕

Aku mungkin ga sempurna,
tapi aku selalu berusaha jadi yang terbaik buat kamu.

Tetap jadi Keysa yang manis,
yang lucu,
dan yang selalu aku sayang yaa ❤️

I Love You More Than Anything 💖
`;

let i = 0;

function typingEffect(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 45);
    }
}

function cekPassword(){
    const pass = document.getElementById("password").value;

    if(pass === "9122010"){

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("main").style.display = "block";

        document.getElementById("musik").play();

        typingEffect();

    }else{
        alert("Sandi salah 😢");
    }
}

/* LOVE ANIMATION */
setInterval(() => {

    const love = document.createElement("div");
    love.classList.add("love");

    love.innerHTML = "❤️";

    love.style.left = Math.random() * window.innerWidth + "px";

    love.style.fontSize = (Math.random() * 20 + 20) + "px";

    love.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.body.appendChild(love);

    setTimeout(() => {
        love.remove();
    }, 6000);

}, 250);

</script>

</body>
</html>
